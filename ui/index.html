<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ChessCoach Local Review</title>
  <link rel="stylesheet" href="/ui/styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>ChessCoach Review Studio</h1>
  </header>
  <main class="layout">
    <aside class="panel controls">
      <h2>Load Games</h2>
      <label>Username <input id="username" placeholder="chess.com username" /></label>
      <label>Days <input id="days" type="number" value="3" min="1" max="365" /></label>
      <button id="loadGames">Load</button>
      <div id="status" class="muted"></div>
      <div id="games" class="games"></div>
    </aside>

    <section class="panel boardPanel">
      <div class="boardTop">
        <button id="flipBtn">Flip</button>
        <button id="prevBtn">◀</button>
        <button id="nextBtn">▶</button>
        <button id="autoplayBtn">Autoplay</button>
        <label><input id="arrowToggle" type="checkbox" checked /> Engine arrow</label>
        <label><input id="highlightToggle" type="checkbox" checked /> Square highlights</label>
      </div>
      <div class="boardWrap">
        <div id="board" class="board"></div>
        <svg id="arrowLayer" class="arrowLayer"></svg>
      </div>
      <div id="moveMeta" class="moveMeta">No game loaded</div>
      <div id="moveList" class="moveList"></div>
    </section>

    <aside class="panel infoPanel">
      <div id="labelBadge" class="labelBadge">—</div>
      <div id="shortExpl" class="shortExpl">Load a game to begin review.</div>
      <details open>
        <summary>Detailed explanation</summary>
        <div id="detailExpl"></div>
      </details>
      <div id="reviewFacts"></div>
      <h3>Game Summary</h3>
      <div id="summary"></div>
    </aside>
  </main>

  <script src="/ui/app.js"></script>
</body>
</html>
